<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - NodeVerse</title>
    <link rel="stylesheet" href="../CssFiles/verify-otp.css">
</head>
<body>

    <div class="otp-container">
        <h1>Email Verification</h1>
        <p>Please enter the 6-digit OTP sent to your email.</p>

        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

        <form id="otpForm">
            <input 
                type="text" 
                id="otpInput" 
                maxlength="6" 
                placeholder="Enter OTP"
                required
            >

            <button type="submit" id="verifyBtn">
                <span>Verify OTP</span>
            </button>
        </form>

        <button id="resendBtn" class="resend-btn">
            Resend OTP
        </button>

        <a href="./signup.html" class="back-link">Back to Signup</a>
    </div>

    <script src="../JsFiles/verify-otp.js"></script>

</body>
</html>
